# Health checks from *inside* the frontend container: use http://host.docker.internal:8000
# (same as Vite proxy). http://backend:8000 often hits ConnectTimeout on broken container bridges.
# Example: docker compose exec frontend node -e "fetch('http://host.docker.internal:8000/health').then(r=>r.text()).then(console.log)"
services:
  postgres:
    image: postgres:15-alpine
    container_name: json-editor-db
    environment:
      POSTGRES_USER: jsoneditor
      POSTGRES_PASSWORD: jsoneditor123
      POSTGRES_DB: json_editor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jsoneditor -d json_editor"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: json-editor-backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Use host-mapped Postgres port when bridge DNS/container↔container fails (common with Docker/Firewall/VPN).
      DATABASE_URL: postgresql://jsoneditor:jsoneditor123@host.docker.internal:5432/json_editor
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: json-editor-frontend
    # Browser loads JS from this container but runs in YOUR browser — use host loopback for the API so
    # requests never depend on Vite's in-container proxy (often breaks when Docker networking breaks).
    # Requires CORS on the backend (see backend CORS_ORIGINS). For UI on another device, set VITE_API_URL to your LAN API URL.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://127.0.0.1:8000
      - VITE_PROXY_TARGET=http://host.docker.internal:8000
    depends_on:
      backend:
        condition: service_started
    command: npm run dev -- --host

volumes:
  postgres_data:
