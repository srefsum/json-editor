version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: json-editor-db
    environment:
      POSTGRES_USER: jsoneditor
      POSTGRES_PASSWORD: jsoneditor123
      POSTGRES_DB: json_editor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jsoneditor"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: json-editor-backend
    environment:
      DATABASE_URL: postgresql://jsoneditor:jsoneditor123@postgres:5432/json_editor
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: json-editor-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    command: npm run dev -- --host

volumes:
  postgres_data:
